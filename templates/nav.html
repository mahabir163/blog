{% load static %}
<script>
function toggleMenu() {
  const menu = document.getElementById("mobile-menu");
  menu.classList.toggle("hidden");
}
</script>

<nav class="bg-blue-600 sticky top-0 z-50 shadow-lg">
  <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
    <div class="relative flex h-16 items-center justify-between">

      <!-- Mobile menu button -->
      <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
        <button onclick="toggleMenu()" class="rounded-md p-2 text-gray-400 hover:bg-gray-700 hover:text-white">
          ☰
        </button>
      </div>

      <!-- Logo + Menu -->
      <div class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-start">

        <div class="flex shrink-0 items-center">
          <span class="text-white font-bold text-xl">DailyDraft</span>
        </div>

        <div class="hidden sm:ml-6 sm:block">
          <div class="flex space-x-4">
            <a href="{% url 'home' %}" class="rounded-md bg-gray-900 px-3 py-2 text-sm font-medium text-white">Home</a>
            <a href="{% url 'drafts' %}" class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Drafts</a>
            <a href="{% url 'pricing' %}" class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Pricing</a>
            <a href="{% url 'build' %}" class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Build</a>
          </div>
        </div>

      </div>

      <!-- Search Bar -->
      <div class="hidden md:block mx-6 flex-1 max-w-md">
        <form action="{% url 'search' %}" method="GET">
          <input
            type="text"
            name="q"
            placeholder="Search drafts..."
            class="w-full rounded-md px-3 py-1.5 text-sm text-gray-800 focus:outline-none"
          >
        </form>
      </div>

      
      <!-- Login + Register -->
        <div class="hidden sm:ml-6 sm:block">
          <div class="flex space-x-4">
            <a href="{% url 'login' %}" class="rounded-md bg-gray-900 px-3 py-2 text-sm font-medium text-white">Log in</a>
            <a href="{% url 'register' %}" class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Register</a>
          </div>
        </div>

      <!-- Notification + Profile -->
      <div class="absolute inset-y-0 right-0 flex items-center pr-2 sm:static sm:inset-auto sm:ml-6 sm:pr-0">

        <button class="p-1 text-gray-400 hover:text-white">
          🔔
        </button>

        <img
          src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e"
          class="ml-3 h-8 w-8 rounded-full"
        >

      </div>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden sm:hidden px-2 pt-2 pb-3 space-y-1 bg-gray-800">
    <a href="{% url 'home' %}" class="block rounded-md bg-gray-900 px-3 py-2 text-base font-medium text-white">Home</a>
    <a href="{% url 'drafts' %}" class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Drafts</a>
    <a href="{% url 'pricing' %}" class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Pricing</a>
    <a href="{% url 'build' %}" class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Build</a>
  </div>

</nav>
