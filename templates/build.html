{% extends 'base.html' %}

{% block title %}DailyDrafts || Pricing{% endblock %}

{% block content %}
<!-- Build Heading -->
<section class="bg-gradient-to-b from-blue-200 to-white py-12">
  <div class="mt-10 justify-center">
    <div class="text-center">
      <h1 class="text-3xl font-bold text-black">Build</h1>
      <p class="mt-4 text-lg text-black-600">
        Build your own drafts and share them with the world.
      </p>
    </div>
  </div>
</section>

<!-- Build Content -->
<div class="lg:pb-10 sm:pb-6">
    <div class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8 border rounded-lg shadow-xl">
        <p class="mb-2 block text-gray-700 text-xl font-bold">Blog Title</p>
        <input type="text" placeholder="Enter blog title" class="mb-5 w-full rounded-md border-gray-700 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 focus:ring-opacity-50">
        <p class="mb-2 block text-gray-700 text-xl font-bold">Blog Content</p>
        <textarea placeholder="Enter blog content" class="mb-5 w-full rounded-md border-gray-700 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 focus:ring-opacity-50 h-40"></textarea>
        <p class="mb-2 block text-gray-700 text-xl font-bold">Thumbnail</p>
        <input type="file" class="mb-5 w-full rounded-md border-gray-700 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 focus:ring-opacity-50">
        <button class="mt-4 inline-block rounded-md bg-blue-600 py-2 px-4 text-center text-white hover:bg-blue-700">
            Publish
        </button>
    </div>
</div>

{% endblock content %}
